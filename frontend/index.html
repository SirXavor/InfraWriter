<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InfraWriter</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #0a0c10;
  --bg2:       #111318;
  --bg3:       #181c24;
  --border:    #1f2530;
  --border2:   #2a3040;
  --text:      #c8d0e0;
  --text2:     #6a7585;
  --text3:     #3a4250;
  --accent:    #3b82f6;
  --accent2:   #1d4ed8;
  --green:     #22c55e;
  --amber:     #f59e0b;
  --red:       #ef4444;
  --purple:    #a855f7;
  --teal:      #14b8a6;
  --mono:      'JetBrains Mono', monospace;
  --sans:      'Syne', sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 14px; }

/* ── Layout ── */
.app { display: grid; grid-template-columns: 280px 1fr; height: 100vh; overflow: hidden; }

/* ── Sidebar ── */
.sidebar {
  background: var(--bg2);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  overflow: hidden;
}
.sidebar-head {
  padding: 20px 20px 16px;
  border-bottom: 1px solid var(--border);
}
.logo { font-size: 18px; font-weight: 800; letter-spacing: -0.5px; color: #fff; }
.logo span { color: var(--accent); }
.logo-sub { font-size: 10px; font-family: var(--mono); color: var(--text2); margin-top: 2px; letter-spacing: 0.08em; }

.sidebar-actions { padding: 12px; border-bottom: 1px solid var(--border); }
.btn-new {
  width: 100%; padding: 9px 14px; background: var(--accent); color: #fff;
  border: none; border-radius: 6px; font-family: var(--sans); font-size: 13px;
  font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 8px;
  transition: background .15s;
}
.btn-new:hover { background: var(--accent2); }
.btn-new svg { flex-shrink: 0; }

.sidebar-filter { padding: 10px 12px; border-bottom: 1px solid var(--border); }
.search { width: 100%; background: var(--bg3); border: 1px solid var(--border2); border-radius: 5px;
  color: var(--text); font-family: var(--mono); font-size: 12px; padding: 7px 10px; outline: none; }
.search:focus { border-color: var(--accent); }
.search::placeholder { color: var(--text3); }

.host-list { flex: 1; overflow-y: auto; padding: 8px; }
.host-list::-webkit-scrollbar { width: 4px; }
.host-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

.host-card {
  padding: 10px 12px; border-radius: 6px; cursor: pointer;
  border: 1px solid transparent; margin-bottom: 4px;
  transition: border-color .15s, background .15s;
}
.host-card:hover { background: var(--bg3); border-color: var(--border2); }
.host-card.active { background: var(--bg3); border-color: var(--accent); }
.hc-name { font-size: 13px; font-weight: 700; color: #fff; }
.hc-host { font-size: 11px; font-family: var(--mono); color: var(--text2); margin-top: 2px; }
.hc-badges { display: flex; gap: 4px; margin-top: 6px; flex-wrap: wrap; }
.badge {
  font-size: 10px; font-family: var(--mono); padding: 2px 6px;
  border-radius: 3px; font-weight: 500; border: 1px solid transparent;
}
.badge-distro { background: #1e3a5f; color: #60a5fa; border-color: #1d4ed8; }
.badge-role   { background: #1a2e1a; color: #4ade80; border-color: #166534; }
.badge-default{ background: #1f1f2e; color: #818cf8; border-color: #3730a3; }

/* ── Main panel ── */
.main { display: flex; flex-direction: column; overflow: hidden; }

.topbar {
  background: var(--bg2); border-bottom: 1px solid var(--border);
  padding: 0 24px; height: 56px; display: flex; align-items: center;
  justify-content: space-between; flex-shrink: 0;
}
.topbar-title { font-size: 16px; font-weight: 700; color: #fff; }
.topbar-sub { font-size: 11px; font-family: var(--mono); color: var(--text2); margin-top: 2px; }
.topbar-actions { display: flex; gap: 8px; }

.btn {
  padding: 7px 14px; border-radius: 5px; font-family: var(--sans);
  font-size: 12px; font-weight: 600; cursor: pointer; border: 1px solid var(--border2);
  background: transparent; color: var(--text); transition: all .15s;
}
.btn:hover { background: var(--bg3); border-color: var(--border2); color: #fff; }
.btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
.btn-primary:hover { background: var(--accent2); border-color: var(--accent2); }
.btn-danger { border-color: #7f1d1d; color: var(--red); }
.btn-danger:hover { background: #7f1d1d22; }
.btn-ghost { border-color: transparent; }

/* ── Tabs ── */
.tabs { display: flex; border-bottom: 1px solid var(--border); padding: 0 24px; background: var(--bg2); flex-shrink: 0; }
.tab {
  padding: 12px 16px; font-size: 12px; font-weight: 600; cursor: pointer;
  color: var(--text2); border-bottom: 2px solid transparent; margin-bottom: -1px;
  transition: color .15s, border-color .15s; display: flex; align-items: center; gap: 6px;
}
.tab:hover { color: var(--text); }
.tab.active { color: #fff; border-bottom-color: var(--accent); }
.tab-dot { width: 6px; height: 6px; border-radius: 50%; }

/* ── Content ── */
.content { flex: 1; overflow-y: auto; padding: 24px; }
.content::-webkit-scrollbar { width: 4px; }
.content::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

/* ── Form sections ── */
.section { margin-bottom: 28px; }
.section-title {
  font-size: 10px; font-family: var(--mono); color: var(--text2);
  letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 12px;
  display: flex; align-items: center; gap: 8px;
}
.section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }

.field { display: flex; flex-direction: column; gap: 5px; }
.field label { font-size: 11px; font-family: var(--mono); color: var(--text2); }
.field input, .field select, .field textarea {
  background: var(--bg3); border: 1px solid var(--border2); border-radius: 5px;
  color: var(--text); font-family: var(--mono); font-size: 12px;
  padding: 8px 10px; outline: none; transition: border-color .15s; width: 100%;
}
.field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); }
.field input:disabled, .field select:disabled, .field textarea:disabled {
  opacity: 0.4; cursor: not-allowed;
}
.field select option { background: var(--bg3); }
.field textarea { resize: vertical; min-height: 72px; line-height: 1.5; }

/* ── Lock warning ── */
.lock-warning {
  background: #1c1400; border: 1px solid #713f12; border-radius: 6px;
  padding: 10px 14px; margin-bottom: 20px;
  display: flex; align-items: center; gap: 10px;
  font-size: 12px; color: #fbbf24; font-family: var(--mono);
}

/* ── MAC list ── */
.mac-row { display: flex; gap: 8px; align-items: center; margin-bottom: 6px; }
.mac-row input { flex: 1; }
.btn-icon {
  width: 30px; height: 30px; border-radius: 5px; border: 1px solid var(--border2);
  background: transparent; color: var(--text2); cursor: pointer;
  display: flex; align-items: center; justify-content: center; font-size: 16px;
  transition: all .15s; flex-shrink: 0;
}
.btn-icon:hover { background: var(--bg3); color: var(--text); border-color: var(--border2); }
.btn-icon.danger:hover { background: #7f1d1d22; color: var(--red); border-color: #7f1d1d; }

/* ── Role chips ── */
.roles-grid { display: flex; flex-wrap: wrap; gap: 8px; }
.role-chip {
  display: flex; align-items: center; gap: 8px; padding: 8px 14px;
  border-radius: 6px; border: 1px solid var(--border2); cursor: pointer;
  background: var(--bg3); transition: all .15s; user-select: none;
}
.role-chip:hover { border-color: var(--border2); background: #1a2030; }
.role-chip.active { border-color: var(--accent); background: #0f1f40; }
.role-chip.locked { opacity: 0.5; cursor: not-allowed; }
.role-chip-name { font-size: 12px; font-family: var(--mono); font-weight: 600; }
.role-chip-desc { font-size: 10px; color: var(--text2); }
.role-chip-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border2); flex-shrink: 0; }
.role-chip.active .role-chip-dot { background: var(--accent); }

/* ── ENS selector ── */
.ens-selector { display: flex; gap: 6px; margin-top: 10px; }
.ens-opt {
  flex: 1; padding: 8px; text-align: center; border-radius: 5px;
  border: 1px solid var(--border2); cursor: pointer; font-size: 11px;
  font-family: var(--mono); font-weight: 600; background: var(--bg3);
  transition: all .15s;
}
.ens-opt:hover { border-color: var(--border2); }
.ens-opt.active-alto   { border-color: var(--red);    background: #1c0a0a; color: var(--red); }
.ens-opt.active-medio  { border-color: var(--amber);  background: #1c1000; color: var(--amber); }
.ens-opt.active-bajo   { border-color: var(--green);  background: #0a1c0a; color: var(--green); }

/* ── Network builder ── */
.net-section { background: var(--bg3); border: 1px solid var(--border); border-radius: 6px; padding: 14px; margin-bottom: 10px; }
.net-section-title { font-size: 11px; font-family: var(--mono); font-weight: 600; color: var(--text); margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; }

/* ── App tiles ── */
.apps-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 12px; }
.app-tile {
  background: var(--bg3); border: 1px solid var(--border); border-radius: 8px;
  padding: 16px; cursor: pointer; transition: border-color .15s;
}
.app-tile:hover { border-color: var(--border2); }
.app-tile.active { border-color: var(--accent); }
.app-tile-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.app-tile-name { font-size: 13px; font-weight: 700; color: #fff; }
.app-tile-desc { font-size: 11px; color: var(--text2); margin-bottom: 12px; line-height: 1.5; }
.toggle { width: 36px; height: 20px; border-radius: 10px; background: var(--border2); position: relative; cursor: pointer; transition: background .2s; flex-shrink: 0; }
.toggle.on { background: var(--accent); }
.toggle::after { content: ''; position: absolute; width: 14px; height: 14px; border-radius: 50%; background: #fff; top: 3px; left: 3px; transition: transform .2s; }
.toggle.on::after { transform: translateX(16px); }

/* ── YAML preview ── */
.yaml-block {
  font-family: var(--mono); font-size: 12px; background: var(--bg3);
  border: 1px solid var(--border); border-radius: 6px; padding: 16px;
  white-space: pre; overflow-x: auto; line-height: 1.7; color: #a0b0c0;
}
.yaml-key { color: #60a5fa; }
.yaml-str { color: #4ade80; }
.yaml-num { color: #fb923c; }

/* ── Empty state ── */
.empty {
  height: 100%; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 12px; color: var(--text2);
}
.empty-icon { font-size: 48px; opacity: .3; }
.empty h2 { font-size: 18px; font-weight: 700; color: var(--text); }
.empty p { font-size: 13px; }

/* ── Spinner ── */
.spinner { width: 20px; height: 20px; border: 2px solid var(--border2); border-top-color: var(--accent); border-radius: 50%; animation: spin .6s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Toast ── */
#toast {
  position: fixed; bottom: 20px; right: 20px; padding: 10px 16px;
  border-radius: 6px; font-family: var(--mono); font-size: 12px;
  background: var(--bg3); border: 1px solid var(--border2); color: var(--text);
  transform: translateY(60px); opacity: 0; transition: all .25s; z-index: 999;
}
#toast.show { transform: translateY(0); opacity: 1; }
#toast.ok   { border-color: var(--green); color: var(--green); }
#toast.err  { border-color: var(--red);   color: var(--red); }

/* ── Divider ── */
hr { border: none; border-top: 1px solid var(--border); margin: 20px 0; }

.mt { margin-top: 10px; }
.row { display: flex; gap: 8px; align-items: flex-end; }
.row .field { flex: 1; }
</style>
</head>
<body>
<div class="app">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-head">
      <div class="logo">Infra<span>Writer</span></div>
      <div class="logo-sub">GitOps Host Manager</div>
    </div>
    <div class="sidebar-actions">
      <button class="btn-new" onclick="openNew()">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1v12M1 7h12" stroke="#fff" stroke-width="2" stroke-linecap="round"/></svg>
        Nuevo host
      </button>
    </div>
    <div class="sidebar-filter">
      <input class="search" type="text" placeholder="Buscar host..." oninput="filterHosts(this.value)" id="searchInput">
    </div>
    <div class="host-list" id="hostList">
      <div style="display:flex;align-items:center;justify-content:center;padding:40px 0;gap:10px;color:var(--text2);font-size:12px;font-family:var(--mono)">
        <div class="spinner"></div> Cargando...
      </div>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main" id="main">
    <div class="empty" style="height:100%">
      <div class="empty-icon">⬡</div>
      <h2>InfraWriter</h2>
      <p>Selecciona un host o crea uno nuevo</p>
    </div>
  </main>
</div>

<div id="toast"></div>

<script>
const API = '/api';

// ── State ──
let hosts = [];
let catalog = { distros: [], profiles: [], roles: [] };
let selectedHost = null;
let isNew = false;
let activeTab = 'identity';
let form = {};

// ── Init ──
async function init() {
  await Promise.all([loadHosts(), loadCatalog()]);
}

async function loadHosts() {
  try {
    const r = await fetch(`${API}/hosts`);
    hosts = await r.json();
    renderSidebar();
  } catch(e) { toast('Error cargando hosts', 'err'); }
}

async function loadCatalog() {
  try {
    const [d, p, r] = await Promise.all([
      fetch(`${API}/catalog/distros`).then(r=>r.json()),
      fetch(`${API}/catalog/profiles`).then(r=>r.json()),
      fetch(`${API}/catalog/roles`).then(r=>r.json()),
    ]);
    catalog.distros  = d;
    catalog.profiles = p;
    catalog.roles    = r;
  } catch(e) { console.warn('Catalog error', e); }
}

// ── Sidebar ──
let filterText = '';
function filterHosts(v) { filterText = v.toLowerCase(); renderSidebar(); }

function renderSidebar() {
  const el = document.getElementById('hostList');
  const visible = hosts.filter(h => {
    const t = filterText;
    if (!t) return true;
    return (h.name||'').toLowerCase().includes(t) ||
           (h.hostname||'').toLowerCase().includes(t);
  });

  if (!visible.length) {
    el.innerHTML = `<div style="text-align:center;padding:30px 0;color:var(--text2);font-size:12px;font-family:var(--mono)">Sin resultados</div>`;
    return;
  }

  el.innerHTML = visible.map(h => {
    const active = selectedHost && selectedHost.name === h.name && !isNew;
    const roles = (h.automation?.roles || []).filter(r => r !== 'bootstrap-agent');
    const distro = h.provisioning?.distro || '';
    const ver = h.provisioning?.version || '';
    return `<div class="host-card${active?' active':''}" onclick="selectHost('${escH(h.name)}')">
      <div class="hc-name">${escH(h.name)}</div>
      <div class="hc-host">${escH(h.hostname||'')}</div>
      <div class="hc-badges">
        ${distro ? `<span class="badge badge-distro">${escH(distro)} ${escH(ver)}</span>` : ''}
        ${roles.slice(0,2).map(r=>`<span class="badge badge-role">${escH(r)}</span>`).join('')}
        ${h.name==='default'?'<span class="badge badge-default">default</span>':''}
      </div>
    </div>`;
  }).join('');
}

// ── Select host ──
function selectHost(name) {
  selectedHost = hosts.find(h => h.name === name);
  isNew = false;
  activeTab = 'identity';
  buildForm(selectedHost);
  renderMain();
}

// ── New host ──
function openNew() {
  selectedHost = null;
  isNew = true;
  activeTab = 'identity';
  const repoUrl = hosts[0]?.automation?.repo?.url || '';
  const repoBranch = hosts[0]?.automation?.repo?.branch || 'main';
  const repoLocal = hosts[0]?.automation?.repo?.local_path || '/opt/InfraServer';
  form = {
    kind: 'host', name: '', hostname: '', profile: 'default',
    identity: { mac: [''] },
    provisioning: { distro: catalog.distros[0]||'rhel', version: '9', server: '', luks_passphrase: '', tang_url: '' },
    automation: {
      repo: { url: repoUrl, local_path: repoLocal, branch: repoBranch },
      apply: { playbook: 'playbooks/bootstrap.yaml', interval: '1h' },
      roles: ['bootstrap-agent'],
      vars: { network: { provisioning: { interface: '', route_metric: 500, autoconnect: true } } }
    }
  };
  renderSidebar();
  renderMain();
}

// ── Build form from existing host ──
function buildForm(h) {
  form = JSON.parse(JSON.stringify(h));
  if (!form.provisioning) form.provisioning = { distro: '', version: '', server: '', luks_passphrase: '', tang_url: '' };
  if (!form.automation) form.automation = { repo: {}, apply: {}, roles: ['bootstrap-agent'], vars: {} };
  if (!form.automation.roles) form.automation.roles = ['bootstrap-agent'];
  if (!form.automation.vars) form.automation.vars = {};
  if (!form.automation.vars.network) form.automation.vars.network = { provisioning: { interface: '', route_metric: 500, autoconnect: true } };
  if (!form.identity) form.identity = { mac: [] };
}

// ── Main render ──
function renderMain() {
  const el = document.getElementById('main');
  if (!isNew && !selectedHost) { el.innerHTML = `<div class="empty" style="height:100%"><div class="empty-icon">⬡</div><h2>InfraWriter</h2><p>Selecciona un host o crea uno nuevo</p></div>`; return; }

  const title = isNew ? 'Nuevo host' : form.name;
  const sub   = isNew ? 'Sin guardar' : form.hostname;

  const primaryMac = form.identity?.mac?.[0] || '';
  const canSave = isNew || true;

  el.innerHTML = `
    <div class="topbar">
      <div>
        <div class="topbar-title">${escH(title)}</div>
        <div class="topbar-sub">${escH(sub)}</div>
      </div>
      <div class="topbar-actions">
        ${!isNew ? `<button class="btn btn-danger" onclick="deleteHost()">Eliminar</button>` : ''}
        <button class="btn btn-ghost" onclick="switchTab('yaml')">Ver YAML</button>
        <button class="btn btn-primary" onclick="saveHost()">
          ${isNew ? 'Crear host' : 'Guardar cambios'}
        </button>
      </div>
    </div>
    <div class="tabs">
      ${renderTabs()}
    </div>
    <div class="content" id="tabContent">
      ${renderTabContent()}
    </div>
  `;
}

function renderTabs() {
  const tabs = [
    { id: 'identity',    label: 'Identidad',    dot: '#3b82f6' },
    { id: 'provisioning',label: 'Provisioning', dot: isNew ? '#f59e0b' : '#4a4a4a', locked: !isNew },
    { id: 'ansible',     label: 'Ansible',      dot: '#22c55e' },
    { id: 'apps',        label: 'Aplicaciones', dot: '#a855f7' },
    { id: 'yaml',        label: 'YAML',         dot: '#14b8a6' },
  ];
  return tabs.map(t => `
    <div class="tab${activeTab===t.id?' active':''}" onclick="switchTab('${t.id}')">
      <span class="tab-dot" style="background:${t.dot}"></span>
      ${t.label}${t.locked?' 🔒':''}
    </div>`).join('');
}

function switchTab(id) { activeTab = id; renderMain(); }

function renderTabContent() {
  if (activeTab === 'identity')     return tabIdentity();
  if (activeTab === 'provisioning') return tabProvisioning();
  if (activeTab === 'ansible')      return tabAnsible();
  if (activeTab === 'apps')         return tabApps();
  if (activeTab === 'yaml')         return tabYaml();
  return '';
}

// ── Tab: Identidad ──
function tabIdentity() {
  const profiles = catalog.profiles.length
    ? catalog.profiles.map(p => `<option value="${escH(p.name)}"${form.profile===p.name?' selected':''}>${escH(p.name)}</option>`).join('')
    : `<option value="${escH(form.profile||'default')}" selected>${escH(form.profile||'default')}</option>`;

  const macs = (form.identity?.mac || ['']).map((m, i) => `
    <div class="mac-row">
      <input value="${escH(m)}" placeholder="aa-bb-cc-dd-ee-ff"
        oninput="setMac(${i}, this.value)" style="flex:1" />
      ${i > 0 ? `<button class="btn-icon danger" onclick="removeMac(${i})">×</button>` : '<div style="width:30px"></div>'}
    </div>`).join('');

  return `
    <div class="section">
      <div class="section-title">General</div>
      <div class="grid-2">
        <div class="field">
          <label>name</label>
          <input value="${escH(form.name||'')}" oninput="form.name=this.value" placeholder="edge-node-01" />
        </div>
        <div class="field">
          <label>hostname</label>
          <input value="${escH(form.hostname||'')}" oninput="form.hostname=this.value" placeholder="edge-node-01" />
        </div>
      </div>
      <div class="field mt">
        <label>profile</label>
        <select onchange="form.profile=this.value">${profiles}</select>
      </div>
    </div>
    <div class="section">
      <div class="section-title">Direcciones MAC</div>
      <div id="macList">${macs}</div>
      <button class="btn mt" onclick="addMac()">+ Añadir MAC</button>
    </div>
    <div class="section">
      <div class="section-title">Automatización — repo</div>
      <div class="field">
        <label>repo url</label>

// ── Tab: YAML ──
function tabYaml() {
  const yaml = buildYaml();

      <pre class="yaml-block">${syntaxHL(yaml)}</pre>

// ── YAML builder ──
function buildYaml() {
  const f = JSON.parse(JSON.stringify(form));
  // Limpiar campos vacíos de provisioning
  if (f.provisioning) {
    Object.keys(f.provisioning).forEach(k => { if (f.provisioning[k] === '') delete f.provisioning[k]; });
  }
  // Limpiar network: fusionar mgmt en vlans si tiene ip4
  const net = f.automation?.vars?.network;
  if (net?.mgmt) {
    const mgmt = net.mgmt;
    if (mgmt.ip4 && mgmt.interface) {
      if (!net.vlans) net.vlans = [];
      const exists = net.vlans.find(v => v.name === mgmt.interface);
      if (!exists) net.vlans.push({ name: mgmt.interface, ip4: mgmt.ip4, gateway4: mgmt.gateway4, dns4: mgmt.dns4, default_route: true, route_metric: 100 });
    }
    delete net.mgmt;
  }
  return jsToYaml(f, 0);
}

function jsToYaml(obj, indent) {
  if (obj === null || obj === undefined) return 'null';
  if (typeof obj === 'boolean') return obj ? 'true' : 'false';
  if (typeof obj === 'number') return String(obj);
  if (typeof obj === 'string') {
    if (obj.includes('\n') || obj.includes('"') || obj.includes(':') || obj.includes('#') || obj === '')
      return `"${obj.replace(/\\/g,'\\\\').replace(/"/g,'\\"').replace(/\n/g,'\\n')}"`;
    return obj;
  }
  const pad = '  '.repeat(indent);
  if (Array.isArray(obj)) {
    if (!obj.length) return '[]';
    return '\n' + obj.map(v => `${pad}- ${jsToYaml(v, indent+1)}`).join('\n');
  }
  const keys = Object.keys(obj).filter(k => obj[k] !== undefined && obj[k] !== null && obj[k] !== '');
  if (!keys.length) return '{}';
  return '\n' + keys.map(k => {
    const v = obj[k];
    if (typeof v === 'object' && v !== null && !Array.isArray(v) && Object.keys(v).length > 0) {
      return `${pad}${k}:${jsToYaml(v, indent+1)}`;
    }
    if (Array.isArray(v) && v.length > 0) {
      return `${pad}${k}:${jsToYaml(v, indent+1)}`;
    }
    return `${pad}${k}: ${jsToYaml(v, indent)}`;
  }).join('\n');
}

function syntaxHL(yaml) {
  return escH(yaml)
    .replace(/^(\s*)([\w_]+):/gm, '$1<span class="yaml-key">$2</span>:')
    .replace(/: (["'][^"']*["'])/g, ': <span class="yaml-str">$1</span>')
    .replace(/: (\d+\.?\d*)/g, ': <span class="yaml-num">$1</span>');
}

// ── Form helpers ──
function setMac(i, v) { form.identity.mac[i] = v; }
function addMac() { if (!form.identity) form.identity = { mac: [] }; form.identity.mac.push(''); rerenderTab(); }
function removeMac(i) { form.identity.mac.splice(i, 1); rerenderTab(); }

function setNetProv(key, val) {
  if (!form.automation.vars.network) form.automation.vars.network = {};
  if (!form.automation.vars.network.provisioning) form.automation.vars.network.provisioning = {};
  form.automation.vars.network.provisioning[key] = val;
}
function setNetMgmt(key, val) {
  if (!form.automation.vars.network) form.automation.vars.network = {};
  if (!form.automation.vars.network.mgmt) form.automation.vars.network.mgmt = {};
  form.automation.vars.network.mgmt[key] = val;
}

function setUser(i, key, val) {
  if (!form.automation.vars.users) form.automation.vars.users = [];
  form.automation.vars.users[i][key] = val;
}
function addUser() {
  if (!form.automation.vars.users) form.automation.vars.users = [];
  form.automation.vars.users.push({ name: '', groups: [], shell: '/bin/bash', ssh_keys: [] });
  rerenderTab();
}
function removeUser(i) { form.automation.vars.users.splice(i, 1); rerenderTab(); }

function setAppVar(role, key, val) {
  if (!form.automation.vars[role]) form.automation.vars[role] = {};
  form.automation.vars[role][key] = val;
}

function toggleRole(name) {
  const roles = form.automation.roles || [];
  const i = roles.indexOf(name);
  if (i >= 0) roles.splice(i, 1); else roles.push(name);
  form.automation.roles = roles;
  rerenderTab();
}

function setPath(path, val) {
  const keys = path.split('.');
  let obj = form;
  for (let i = 0; i < keys.length - 1; i++) {
    if (!obj[keys[i]]) obj[keys[i]] = {};
    obj = obj[keys[i]];
  }
  obj[keys[keys.length-1]] = val;
}

function rerenderTab() {
  const el = document.getElementById('tabContent');
  if (el) el.innerHTML = renderTabContent();
}

// ── Save ──
async function saveHost() {
  const payload = buildPayload();
  if (!payload) return;

  const primaryMac = form.identity?.mac?.[0];
  const method = isNew ? 'POST' : 'PUT';
  const url = isNew ? `${API}/hosts` : `${API}/hosts/${encodeURIComponent(primaryMac)}`;

  try {
    const r = await fetch(url, {
      method, headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    if (!r.ok) {
      const err = await r.json().catch(()=>({detail:'Error desconocido'}));
      toast(err.detail || 'Error guardando', 'err');
      return;
    }
    toast(isNew ? 'Host creado ✓' : 'Guardado ✓', 'ok');
    await loadHosts();
    if (isNew) {
      isNew = false;
      selectedHost = hosts.find(h => h.name === form.name) || hosts[0];
      if (selectedHost) buildForm(selectedHost);
    }
    renderSidebar();
    renderMain();
  } catch(e) { toast('Error de red', 'err'); }
}

function buildPayload() {
  const f = JSON.parse(JSON.stringify(form));
  // Validaciones mínimas
  if (!f.name?.trim()) { toast('El nombre es obligatorio', 'err'); return null; }
  if (!f.hostname?.trim()) { toast('El hostname es obligatorio', 'err'); return null; }
  if (!f.identity?.mac?.filter(Boolean).length) { toast('Se necesita al menos una MAC', 'err'); return null; }
  f.identity.mac = f.identity.mac.filter(Boolean);
  // Limpiar provisioning vacío
  if (f.provisioning) {
    Object.keys(f.provisioning).forEach(k => { if (f.provisioning[k] === '' || f.provisioning[k] === null) delete f.provisioning[k]; });
    if (!f.provisioning.distro) delete f.provisioning;
  }
  return f;
}

// ── Delete ──
async function deleteHost() {
  if (!confirm(`¿Eliminar host "${form.name}"? Esta acción no se puede deshacer.`)) return;
  const mac = form.identity?.mac?.[0];
  try {
    const r = await fetch(`${API}/hosts/${encodeURIComponent(mac)}`, { method: 'DELETE' });
    if (!r.ok) { toast('Error eliminando', 'err'); return; }
    toast('Host eliminado', 'ok');
    selectedHost = null;
    isNew = false;
    await loadHosts();
    renderSidebar();
    document.getElementById('main').innerHTML = `<div class="empty" style="height:100%"><div class="empty-icon">⬡</div><h2>InfraWriter</h2><p>Selecciona un host o crea uno nuevo</p></div>`;
  } catch(e) { toast('Error de red', 'err'); }
}

// ── Toast ──
function toast(msg, type='') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `show ${type}`;
  setTimeout(() => { el.className = ''; }, 3000);
}

// ── Utils ──
function escH(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

init();
</script>
